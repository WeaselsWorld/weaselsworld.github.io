<!DOCTYPE html>
<html>
<head>
    <title>Gallery</title>

    <!-- PhotoSwipe CSS -->
    <link rel="stylesheet" href="https://unpkg.com/photoswipe@5/dist/photoswipe.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Main stylesheet -->
    <link rel="stylesheet" href="styles2.css">
</head>

<body>

    <!-- FLYING HAWK -->
    <img id="hawk" src="swoopinghawk.png" alt="NZ Hawk">

    <!-- PERCHED HAWK WRAPPER (for sliding) -->
    <div id="hawkPerchedWrapper" class="hawk-hidden">
        <img id="hawkPerched" src="hawk-sitting.png" alt="Perched Hawk">
    </div>

    <!-- AUDIO -->
    <audio id="hawkSound" src="hawk-screech.mp3" preload="auto"></audio>

<header>
    <h2>Photo Gallery</h2>
</header>

<div class="container">
    <h1>My Gallery</h1>
    <p>Images of places I've been.</p>

    <!-- PhotoSwipe Gallery -->
    <div class="gallery" id="my-gallery">

        <a href="image1.jpg" data-pswp-width="1600" data-pswp-height="900">
            <img src="image1.jpg" alt="another day from victory bridge">
        </a>

        <a href="image2.jpg" data-pswp-width="1600" data-pswp-height="900">
            <img src="image2.jpg" alt="out my back door">
        </a>

        <a href="image3.jpg" data-pswp-width="1600" data-pswp-height="900">
            <img src="image3.jpg" alt="down Blair road">
        </a>

    </div>

    <br>

    <div class="button-group">
        <a href="index.html" class="primary-btn">Back Home</a>
        <br><br>
        <a href="page2.html" class="primary-btn">Birds, Bugs & More</a>
    </div>
</div>

<!-- PhotoSwipe Lightbox Script -->
<script type="module">
    import PhotoSwipeLightbox from 'https://unpkg.com/photoswipe@5/dist/photoswipe-lightbox.esm.min.js';

    const lightbox = new PhotoSwipeLightbox({
        gallery: '#my-gallery',
        children: 'a',
        pswpModule: () => import('https://unpkg.com/photoswipe@5/dist/photoswipe.esm.min.js')
    });

    lightbox.init();
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const hawk = document.getElementById("hawk");
    const hawkPerchedWrapper = document.getElementById("hawkPerchedWrapper");
    const hawkSound = document.getElementById("hawkSound");

    /* -----------------------------------------
       ENTRY SEQUENCE — SWOOP → GLIDE → PERCH
    ------------------------------------------*/

    hawkPerchedWrapper.classList.add("hawk-hidden");

    hawk.classList.add("hawk-entry");
    hawkSound.currentTime = 0;
    hawkSound.play();

    hawk.addEventListener("animationend", function entryDone(e) {
        if (e.animationName === "hawkEntry") {
            hawk.classList.remove("hawk-entry");

            hawkPerchedWrapper.classList.remove("hawk-hidden");
            hawkPerchedWrapper.classList.add("hawk-slide-in");

            hawk.removeEventListener("animationend", entryDone);
        }
    });

    /* -----------------------------------------
       EXIT SEQUENCE — SLIDE OUT → SWOOP AWAY
    ------------------------------------------*/

    const buttons = document.querySelectorAll(".primary-btn");

    buttons.forEach(btn => {
        btn.addEventListener("click", (e) => {
            e.preventDefault();

            hawkPerchedWrapper.classList.remove("hawk-slide-in");
            hawkPerchedWrapper.classList.add("hawk-slide-out");

            hawkPerchedWrapper.addEventListener("animationend", function perchGone(ev) {
                if (ev.animationName === "hawkSlideOut") {

                    hawk.classList.add("hawk-exit");
                    hawkSound.currentTime = 0;
                    hawkSound.play();

                    hawkPerchedWrapper.removeEventListener("animationend", perchGone);
                }
            });

            hawk.addEventListener("animationend", function exitDone(ev) {
                if (ev.animationName === "hawkExit") {
                    hawk.removeEventListener("animationend", exitDone);
                    window.location.href = btn.href;
                }
            });
        });
    });
});
</script>

<footer>
    <p>© 2026 Weasels World</p>
</footer>

</body>
</html>
