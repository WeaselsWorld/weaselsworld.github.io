c<html>
    <head>
        <title>Gallery</title>
        <link rel="stylesheet" href="styles.css">
        <style>
            /* Lightbox base */
            .lightbox {
                display: none;
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: rgba(0,0,0,0.9);
                justify-content: center;
                align-items: center;
                z-index: 9999;
            }

            .lightbox:target {
                display: flex;
            }

            .lightbox img {
                max-width: 80%;
                max-height: 80%;
                border-radius: 10px;
            }

            /* Arrows */
            .prev, .next {
                position: absolute;
                top: 50%;
                font-size: 50px;
                color: white;
                text-decoration: none;
                padding: 10px;
                transform: translateY(-50%);
                transition: 0.3s;
            }

            .prev:hover, .next:hover {
                color: #00ccff;
                transform: translateY(-50%) scale(1.2);
            }

            .prev { left: 30px; }
            .next { right: 30px; }
        </style>
    </head>

    <body>

        <header>
            <h2>Photo Gallery</h2>
        </header>

        <div class="container">
            <h1>My Gallery</h1>
            <p>Here are some cool images.</p>

            <div class="gallery">

                <!-- Thumbnail 1 -->
                <a href="#img1">
                    <img src="image1.jpg" alt="another day from victory bridge">
                </a>

                <!-- Thumbnail 2 -->
                <a href="#img2">
                    <img src="image2.jpg" alt="out my back door">
                </a>

                <!-- Thumbnail 3 -->
                <a href="#img3">
                    <img src="image3.jpg" alt="down Blair road">
                </a>

            </div>

            <a href="index.html" class="primary-btn">Back to Home</a>
        </div>

        <!-- ⭐ Lightbox Popups with Arrows ⭐ -->

        <div id="img1" class="lightbox">
            <a href="#" class="close">x</a>
	    <a href="#img3" class="prev">&#8592;</a>
            <img src="image1.jpg">
            <a href="#img2" class="next">&#8594;</a>
        </div>

        <div id="img2" class="lightbox">
            <a href="#" class="close">x</a>
    	    <a href="#img1" class="prev">&#8592;</a>
            <img src="image2.jpg">
            <a href="#img3" class="next">&#8594;</a>
        </div>

        <div id="img3" class="lightbox">
            <a href="#" class="close">x</a>
	    <a href="#img2" class="prev">&#8592;</a>
            <img src="image3.jpg">
            <a href="#img1" class="next">&#8594;</a>
        </div>

        <footer>
            <p>© 2026 Weasels World</p>
        </footer>

    </body>
</html>
