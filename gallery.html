<!DOCTYPE html>
<html>
<head>
    <title>Gallery</title>

    <!-- PhotoSwipe CSS -->
    <link rel="stylesheet" href="https://unpkg.com/photoswipe@5/dist/photoswipe.css">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Your main stylesheet -->
    <link rel="stylesheet" href="styles.css">

    <!-- Gallery grid styling (kept) -->
    <style>
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .gallery img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            transition: 0.2s;
        }

        .gallery img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>

    <img id="hawk" src="swoopinghawk.png" alt="NZ Hawk">
    <audio id="hawkSound" src="hawk-screech.mp3" preload="auto"></audio>

<header>
    <h2>Photo Gallery</h2>
</header>

<div class="container">
    <h1>My Gallery</h1>
    <p>Images of places I've been.</p>

    <!-- PhotoSwipe Gallery -->
    <div class="gallery" id="my-gallery">

        <a href="image1.jpg"
           data-pswp-width="1600"
           data-pswp-height="900">
            <img src="image1.jpg" alt="another day from victory bridge">
        </a>

        <a href="image2.jpg"
           data-pswp-width="1600"
           data-pswp-height="900">
            <img src="image2.jpg" alt="out my back door">
        </a>

        <a href="image3.jpg"
           data-pswp-width="1600"
           data-pswp-height="900">
            <img src="image3.jpg" alt="down Blair road">
        </a>

    </div>

    <br>

    <div class="button-group">
        <a href="index.html" class="primary-btn">Back Home</a>
        <br><br>
        <a href="page2.html" class="primary-btn">Go to Page 2</a>
    </div>
</div>

<!-- PhotoSwipe Lightbox Script -->
<script type="module">
    import PhotoSwipeLightbox from 'https://unpkg.com/photoswipe@5/dist/photoswipe-lightbox.esm.min.js';

    const lightbox = new PhotoSwipeLightbox({
        gallery: '#my-gallery',
        children: 'a',
        pswpModule: () => import('https://unpkg.com/photoswipe@5/dist/photoswipe.esm.min.js')
    });

    lightbox.init();
</script>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const hawk = document.getElementById("hawk");
    const hawkSound = document.getElementById("hawkSound");

    /* -------------------------
       ENTRY ANIMATION + AUDIO
    --------------------------*/
    hawk.classList.add("hawk-entry");
    hawkSound.currentTime = 0;
    hawkSound.play();

    setTimeout(() => {
        hawk.classList.remove("hawk-entry");
    }, 5200);

    /* -------------------------
       EXIT ANIMATION + AUDIO
    --------------------------*/
    const buttons = document.querySelectorAll(".primary-btn");

    buttons.forEach(btn => {
        btn.addEventListener("click", (e) => {
            e.preventDefault();

            hawk.classList.add("hawk-exit");

            hawkSound.currentTime = 0;
            hawkSound.play();

            setTimeout(() => {
                window.location.href = btn.href;
            }, 3350);
        });
    });

});
</script>

<footer>
    <p>© 2026 Weasels World</p>
</footer>

</body>
</html>
