<!DOCTYPE html>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="styles.css">

    <!-- Lightbox-specific CSS -->
    <style>
        /* Lightbox base */
        .lightbox {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .lightbox:target {
            display: flex;
        }

        .lightbox img {
            max-width: 80%;
            max-height: 80%;
            border-radius: 10px;
        }

        /* Arrows */
        .prev, .next {
            position: absolute;
            top: 50%;
            font-size: 50px;
            color: white;
            text-decoration: none;
            padding: 10px;
            transform: translateY(-50%);
            transition: 0.3s;
        }

        .prev:hover, .next:hover {
            color: #00ccff;
            transform: translateY(-50%) scale(1.2);
        }

        .prev { left: 30px; }
        .next { right: 30px; }

        /* Close button */
        .close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 40px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .close:hover {
            color: #ff4444;
            transform: scale(1.2);
        }

        /* Gallery grid */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .gallery img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            transition: 0.2s;
        }

        .gallery img:hover {
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }
    </style>
</head>

<body>
